<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pretentious Chocolates</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: black;
      overflow: hidden;
      font-family: 'Cormorant Garamond', serif;
    }

    .bg {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      background: url('https://cdn.pixabay.com/photo/2020/03/09/17/17/chocolate-4914338_1280.jpg') center center / cover no-repeat;
      filter: brightness(0%) blur(5px);
      transition: filter 4s ease-in-out 2s;
      z-index: -2;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      position: relative;
      flex-direction: column;
    }

    .line-and-title {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .shimmer-line {
      width: 4px;
      height: 0%;
      background: linear-gradient(to top, transparent, #d4af37, transparent);
      animation: riseUp 2s ease-in-out forwards;
      z-index: 1;
    }

    .word {
      position: relative;
      font-size: 3.5rem;
      color: #d4af37;
      opacity: 0;
      white-space: nowrap;
      text-shadow: 0 0 20px rgba(0,0,0,0.8);
    }

    .left {
      margin-right: 1rem;
      transform: translateX(100%);
      animation: slideLeft 2s ease-out forwards;
      animation-delay: 2.2s;
    }

    .right {
      margin-left: 1rem;
      transform: translateX(-100%);
      animation: slideRight 2s ease-out forwards;
      animation-delay: 2.2s;
    }

    .tagline {
      margin-top: 2rem;
      font-size: 1.5rem;
      font-style: italic;
      color: #d4af37;
      opacity: 0;
      animation: fadeInTagline 2s ease-in forwards;
      animation-delay: 4.4s;
      text-shadow: 0 0 15px rgba(0,0,0,0.6);
      text-align: center;
      line-height: 1.6;
    }

    .enter-link {
      margin-top: 2rem;
      font-size: 1.2rem;
      color: #d4af37;
      opacity: 0;
      cursor: pointer;
      text-decoration: none;
      animation: fadeInEnter 2s ease-in forwards;
      animation-delay: 5.5s;
      transition: transform 0.3s ease;
    }

    .enter-link:hover {
      transform: scale(1.1);
    }

    @keyframes riseUp {
      to {
        height: 150px;
      }
    }

    @keyframes slideLeft {
      to {
        transform: translateX(-60px);
        opacity: 1;
      }
    }

    @keyframes slideRight {
      to {
        transform: translateX(60px);
        opacity: 1;
      }
    }

    @keyframes fadeInTagline {
      to {
        opacity: 1;
      }
    }

    @keyframes fadeInEnter {
      to {
        opacity: 1;
      }
    }

    @media (max-width: 768px) {
      .word {
        font-size: 2rem;
      }

      .tagline {
        font-size: 1.2rem;
        line-height: 1.4;
      }

      .enter-link {
        font-size: 1rem;
      }

      @keyframes slideLeft {
        to {
          transform: translateX(-30px);
          opacity: 1;
        }
      }

      @keyframes slideRight {
        to {
          transform: translateX(30px);
          opacity: 1;
        }
      }
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="bg" id="background"></div>

  <div class="container">
    <div class="line-and-title">
      <div class="word left">Pretentious</div>
      <div class="shimmer-line"></div>
      <div class="word right">Chocolates</div>
    </div>
    <div class="tagline">Unapologetically Opulent Bon Bons<br>by Brian Holm</div>
    <a href="https://www.pretentiouschocolates.com/main.html" class="enter-link">Click to Enter</a>
  </div>

  <script>
    setTimeout(() => {
      document.getElementById('background').style.filter = 'brightness(70%) blur(0px)';
    }, 2000);
  </script>

</body>
</html>
